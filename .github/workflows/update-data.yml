name: Auto Update Market Data

on:
  # Trigger automatically at 22:00 UTC (06:00 CST next day), Monday to Friday
  schedule:
    - cron: '0 22 * * 1-5'
  # Allow manual trigger from the GitHub Actions UI
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-data:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas numpy yfinance

      - name: Run data update script
        run: python scripts/update_data.py

      - name: Commit and push changes
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add data/latest.json data/history.json
          
          # Only commit if there are changes to avoid workflow errors
          git diff --staged --quiet || git commit -m "chore: auto-update market data"
          git push